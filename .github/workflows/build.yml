name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: suno-checker-windows.zip
            spec: predict.spec
          - os: windows-latest
            artifact: suno-checker-windows-portable.zip
            spec: predict-portable.spec
          - os: macos-latest
            artifact: suno-checker-macos.dmg
            spec: predict.spec
          - os: ubuntu-latest
            artifact: suno-checker-linux.tar.gz
            spec: predict.spec

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libxcb-cursor0 \
            libxcb-icccm4 libxcb-keysyms1 libxcb-shape0 \
            libxcb-xkb1 libxkbcommon-x11-0 libxcb-xinerama0

      - name: Install Python deps
        run: pip install pyinstaller librosa "numpy<2" scipy onnxruntime==1.16.3 pyqt5 pyloudnorm qtawesome

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller ${{ matrix.spec }}
          if ("${{ matrix.artifact }}" -like "*portable*") {
            Compress-Archive -Path dist/suno-checker-portable.exe -DestinationPath dist/${{ matrix.artifact }}
          } else {
            Compress-Archive -Path dist/suno-checker/* -DestinationPath dist/${{ matrix.artifact }}
          }

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller ${{ matrix.spec }}
          hdiutil create -volname "Suno Checker" -srcfolder "dist/Suno Checker.app" \
            -ov -format UDZO dist/${{ matrix.artifact }}

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          pyinstaller ${{ matrix.spec }}
          tar -czf dist/suno-checker-linux.tar.gz -C dist suno-checker

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          body: |
            # Suno Checker v0.4.2 更新说明

            ### 下载指南

              *   **`suno-checker-windows.zip` (Windows标准版)**:
              *   解压后使用。双击**秒开**，完全没有启动延迟，且杀毒软件误报概率极低（**推荐**）。
               *   **`suno-checker-windows-portable.zip` (Windows便携版)**:
              *   双击直接运行，免去解压多文件的麻烦。由于单文件每次启动需后台解压，会有 3-5 秒左右的启动延时，属于正常现象。
             *   **`suno-checker-macos.M1.dmg` (macOS arm版)**:
              *   适用于 macOS 14 (Sonoma) 及以上系统的标准安装包磁盘镜像。
             *   **`suno-checker-macos.intel.dmg` (macOS intel 版)**:
              *   适用于 macOS 13 及以下系统的标准安装包磁盘镜像。
              *   **`suno-checker-linux.tar.gz` (Linux 版)**:
              *   适用于 Linux 系统的绿色解压版。

             ### 🛠️ v0.4.2 更新日志

                1.  **彻底重构与清理旧版 CNN 逻辑**：移除了旧版 CNN 推理与预处理代码，并清理了 `librosa` / `pyloudnorm` 等顶层强依赖，极大缩减了包体外部依赖。
                2.  **ONNX 会话单例全局复用**：将 ONNX 推理会话的初始化移入主窗口中，在启动时仅加载一次并全局共享复用，显著消除了每次拖拽音频都要重复读取模型的性能开销。
                3.  **修复第二次拖拽音频闪退秒退 Bug**：完善了线程生命周期销毁与 Python 对象的置空检测逻辑，彻底解决连续分析音频时 C++ 实例释放引起的 `RuntimeError` 崩溃。
                4.  **全面集成 qtawesome 矢量图标**：引入了矢量图标库，用上传云、显微镜、警告三角形、完成打勾圆圈以及文件等矢量图标完美替代了各平台显示不一的 Emoji 字符，提升整体 UI 科技感。
                5.  **扫描态文字色彩与日志体验优化**：将分析时显示文字颜色调优为纯白色以改善高对比度可读性，并且彻底隐藏了冗余的过程调试日志，实现更清爽的音频状态反馈。
