name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: suno-checker-windows.zip
          - os: macos-latest
            artifact: suno-checker-macos.dmg
          - os: ubuntu-latest
            artifact: suno-checker-linux.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libxcb-cursor0 \
            libxcb-icccm4 libxcb-keysyms1 libxcb-shape0 \
            libxcb-xkb1 libxkbcommon-x11-0 libxcb-xinerama0

      - name: Install Python deps
        run: pip install pyinstaller librosa numpy scipy onnxruntime pyqt5 pyloudnorm

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --noconsole --onedir `
            --add-data "ai_music_detector.onnx;." `
            --hidden-import fakeprint `
            --hidden-import scipy.ndimage._nd_image `
            --hidden-import scipy.ndimage._filters `
            --hidden-import scipy.special._ufuncs_cxx `
            --hidden-import soundfile `
            --hidden-import pyloudnorm `
            --name suno-checker `
            predict.py
          # 暴力复制 onnxruntime 全部原生二进制到输出根目录
          $ort_root = (python -c "import onnxruntime, os; print(os.path.dirname(onnxruntime.__file__))")
          Get-ChildItem -Path $ort_root -Recurse -Include *.dll,*.pyd | Copy-Item -Destination dist/suno-checker/ -Force
          Compress-Archive -Path dist/suno-checker/* -DestinationPath dist/suno-checker-windows.zip

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --windowed --onedir \
            --add-data "ai_music_detector.onnx:." \
            --collect-all onnxruntime \
            --hidden-import fakeprint \
            --hidden-import scipy.ndimage._nd_image \
            --hidden-import scipy.ndimage._filters \
            --hidden-import scipy.special._ufuncs_cxx \
            --hidden-import soundfile \
            --hidden-import pyloudnorm \
            --name "Suno Checker" \
            --osx-bundle-identifier com.suno.checker \
            predict.py
          hdiutil create -volname "Suno Checker" -srcfolder "dist/Suno Checker.app" \
            -ov -format UDZO dist/suno-checker-macos.dmg

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          pyinstaller predict.spec
          tar -czf dist/suno-checker-linux.tar.gz -C dist suno-checker

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
