name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: suno-checker-windows.zip
          - os: macos-latest
            artifact: suno-checker-macos.dmg
          - os: ubuntu-latest
            artifact: suno-checker-linux.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libxcb-cursor0 \
            libxcb-icccm4 libxcb-keysyms1 libxcb-shape0 \
            libxcb-xkb1 libxkbcommon-x11-0 libxcb-xinerama0

      - name: Install Python deps
        run: pip install pyinstaller librosa numpy scipy onnxruntime pyqt5 pyloudnorm

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller predict.spec
          Compress-Archive -Path dist/suno-checker/* -DestinationPath dist/suno-checker-windows.zip

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --windowed --osx-bundle-identifier com.suno.checker predict.spec
          mv "dist/Suno Checker.app" "dist/suno-checker.app" 2>/dev/null || true
          hdiutil create -volname "Suno Checker" -srcfolder "dist/suno-checker.app" \
            -ov -format UDZO dist/suno-checker-macos.dmg

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          pyinstaller predict.spec
          tar -czf dist/suno-checker-linux.tar.gz -C dist suno-checker

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
