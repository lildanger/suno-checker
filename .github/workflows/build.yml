name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: suno-checker-windows.zip
            spec: predict.spec
          - os: windows-latest
            artifact: suno-checker-windows-portable.zip
            spec: predict-portable.spec
          - os: macos-latest
            artifact: suno-checker-macos.dmg
            spec: predict.spec
          - os: ubuntu-latest
            artifact: suno-checker-linux.tar.gz
            spec: predict.spec

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libxcb-cursor0 \
            libxcb-icccm4 libxcb-keysyms1 libxcb-shape0 \
            libxcb-xkb1 libxkbcommon-x11-0 libxcb-xinerama0

      - name: Install Python deps
        run: pip install pyinstaller librosa "numpy<2" scipy onnxruntime==1.16.3 pyqt5 pyloudnorm

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller ${{ matrix.spec }}
          if ("${{ matrix.artifact }}" -like "*portable*") {
            Compress-Archive -Path dist/suno-checker-portable.exe -DestinationPath dist/${{ matrix.artifact }}
          } else {
            Compress-Archive -Path dist/suno-checker/* -DestinationPath dist/${{ matrix.artifact }}
          }

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller ${{ matrix.spec }}
          hdiutil create -volname "Suno Checker" -srcfolder "dist/Suno Checker.app" \
            -ov -format UDZO dist/suno-checker-macos.dmg

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          pyinstaller ${{ matrix.spec }}
          tar -czf dist/suno-checker-linux.tar.gz -C dist suno-checker

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          body_path: release_notes.md
